<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			width: 240px;
			padding: 16px;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			font-size: 13px;
			color: #1a1a1a;
			background: #fff;
		}
		h1 {
			font-size: 14px;
			font-weight: 600;
			margin-bottom: 12px;
			display: flex;
			align-items: center;
			gap: 6px;
		}
		.status {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 8px 10px;
			border-radius: 6px;
			background: #f5f5f5;
		}
		.dot {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			flex-shrink: 0;
		}
		.dot.connected { background: #22c55e; }
		.dot.disconnected { background: #6b7280; }
		.label { font-size: 12px; color: #555; }
		.port {
			margin-top: 8px;
			font-size: 11px;
			color: #888;
		}
	</style>
</head>
<body>
	<h1>Agent Lens</h1>
	<div class="status">
		<div class="dot" id="dot"></div>
		<span id="label">Checking...</span>
	</div>
	<div class="port">ws://localhost:17731</div>
	<script src="popup.js" type="module"></script>
</body>
</html>
